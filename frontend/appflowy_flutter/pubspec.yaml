name: appflowy
description: Bring projects, wikis, and teams together with AI. AppFlowy is an
  AI collaborative workspace where you achieve more without losing control of
  your data. The best open source alternative to Notion.
publish_to: "none"

version: 0.11.4

environment:
  flutter: ">=3.27.4"
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  any_date: ^1.0.4
  app_links: ^6.3.3
  appflowy_backend:
    path: packages/appflowy_backend
  appflowy_board:
    git:
      url: https://github.com/ydbdy/AppFlowy-Board.git
      ref: 804d7898ac0becabf73e45527baf5d5c573cd6bb
  appflowy_editor:
  appflowy_editor_plugins:
  appflowy_popover:
    path: packages/appflowy_popover
  appflowy_result:
    path: packages/appflowy_result
  appflowy_ui:
    path: packages/appflowy_ui
  archive: ^3.4.10
  auto_size_text_field: ^2.2.3
  auto_updater: ^1.0.0
  avatar_stack: ^3.0.0

  # BitsDojo Window for Windows
  bitsdojo_window: ^0.1.6
  bloc: ^9.0.0
  calendar_view:
    git:
      url: https://github.com/Xazin/flutter_calendar_view.git
      ref: 6fe0c98
  cross_file: ^0.3.4+1

  # Desktop Drop uses Cross File (XFile) data type
  defer_pointer: ^0.0.2
  desktop_drop: ^0.5.0
  device_info_plus:
  diffutil_dart: ^4.0.1
  dotted_border: ^2.0.0+3
  easy_localization: ^3.0.2
  envied: ^1.0.1
  equatable: ^2.0.5
  expandable: ^5.0.1
  extended_text_field: ^16.0.2
  extended_text_library: ^12.0.0
  file: ^7.0.0
  fixnum: ^1.1.0
  flex_color_picker: ^3.5.1
  flowy_infra:
    path: packages/flowy_infra
  flowy_infra_ui:
    path: packages/flowy_infra_ui
  flowy_svg:
    path: packages/flowy_svg
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.0
  flutter_bloc: ^9.1.0
  flutter_cache_manager: ^3.3.1
  flutter_chat_core: 0.0.2
  flutter_chat_ui: ^2.0.0-dev.1
  flutter_emoji_mart:
    path: ../../../../flutter_emoji_mart

  flutter_staggered_grid_view: ^0.7.0
  flutter_tex: ^4.0.9
  fluttertoast: ^8.2.6
  freezed_annotation: ^2.2.0
  get_it: ^8.0.3
  go_router: ^14.2.0
  google_fonts: ^6.1.0
  highlight: ^0.7.0
  hive_flutter: ^1.1.0
  hotkey_manager: ^0.1.7
  html2md: ^1.3.2
  http: ^1.0.0
  image_picker: ^1.0.4

  #  third party packages
  intl: ^0.19.0
  json_annotation: ^4.8.1
  keyboard_height_plugin: ^0.1.5
  leak_tracker: ^10.0.0
  linked_scroll_controller: ^0.2.0

  # Notifications
  # TODO: Consider implementing custom package
  # to gather notification handling for all platforms
  local_notifier: ^0.1.5
  markdown:
  markdown_widget: ^2.3.2+6
  mime: ^2.0.0
  nanoid: ^1.0.0
  numerus: ^2.1.2
  # Used to open local files on Mobile
  open_filex: ^4.5.0
  package_info_plus: ^8.0.2
  path: ^1.8.3
  path_provider: ^2.0.15
  percent_indicator: 4.2.3
  permission_handler: ^11.3.1
  protobuf: ^3.1.0
  provider: ^6.0.5
  reorderable_tabbar: ^1.0.6
  reorderables: ^0.6.0
  scaled_app: ^2.3.0
  scroll_to_index: ^3.0.1
  scrollable_positioned_list: ^0.3.8
  share_plus: ^10.0.2
  shared_preferences: ^2.2.2
  sheet:
  sized_context: ^1.0.0+4
  string_validator: ^1.0.0
  styled_widget: ^0.4.1
  super_clipboard: ^0.8.24
  synchronized: ^3.1.0+1
  table_calendar: ^3.0.9
  time: ^2.1.3
  event_bus: ^2.0.1

  toastification: ^2.0.0
  universal_platform: ^1.1.0
  unsplash_client: ^2.1.1
  url_launcher: ^6.1.11
  url_protocol:

  # Window Manager for MacOS and Linux
  version: ^3.0.2
  xml: ^6.5.0
  window_manager: ^0.4.3
  saver_gallery: ^4.0.1
  talker_bloc_logger: ^4.8.1
  talker: ^4.7.1

  analyzer: 6.11.0

  html: any
dev_dependencies:
  # Introduce talker to log the bloc events, and only log the events in the development mode

  bloc_test: ^10.0.0
  build_runner: ^2.4.9
  envied_generator: ^1.0.1
  flutter_lints: ^5.0.0

  flutter_test:
    sdk: flutter
  freezed: ^2.4.7
  integration_test:
    sdk: flutter
  json_serializable: ^6.7.1

  mocktail: ^1.0.1

  plugin_platform_interface: any
  run_with_network_images: ^0.0.1
  url_launcher_platform_interface: any

dependency_overrides:
  http: ^1.0.0
  device_info_plus: ^11.2.2

  url_protocol:
    git:
      url: https://github.com/LucasXu0/flutter_url_protocol.git
      ref: 77a8420

  appflowy_editor:
    git:
      url: https://github.com/ydbdy/AppFlowy-Editor.git
      ref: 6fbe7ba442ad942d6f18884f0a0c8278c524fa05

  appflowy_editor_plugins:
    git:
      url: https://github.com/ydbdy/AppFlowy-Plugins.git
      ref: 9fe683f1efd1ee0ff69417d44d37bea5fd813225
      path: packages/appflowy_editor_plugins

  sheet:
    git:
      url: https://github.com/jamesblasco/modal_bottom_sheet.git
      path: sheet
      ref: e44458d

  window_manager:
    git:
      url: https://github.com/leanflutter/window_manager.git
      path: packages/window_manager
      ref: 5a43aed

  uuid: ^4.4.0

  flutter_cache_manager:
    git:
      url: https://github.com/LucasXu0/flutter_cache_manager.git
      path: flutter_cache_manager
      ref: fbab857b1b1d209240a146d32f496379b9f62276

  flutter_sticky_header: ^0.7.0

  reorderable_tabbar:
    git:
      url: https://github.com/LucasXu0/reorderable_tabbar.git
      ref: 93c4977
  # Don't upgrade file_picker until the issue is fixed
  # https://github.com/miguelpruivo/flutter_file_picker/issues/1652
  file_picker: 8.1.4

  auto_updater:
    git:
      url: https://github.com/LucasXu0/auto_updater.git
      path: packages/auto_updater
      ref: 1d81a824f3633f1d0200ba51b78fe0f9ce429458

  auto_updater_macos:
    git:
      url: https://github.com/LucasXu0/auto_updater.git
      path: packages/auto_updater_macos
      ref: 1d81a824f3633f1d0200ba51b78fe0f9ce429458

  auto_updater_platform_interface:
    git:
      url: https://github.com/LucasXu0/auto_updater.git
      path: packages/auto_updater_platform_interface
      ref: 1d81a824f3633f1d0200ba51b78fe0f9ce429458

  unsplash_client:
    git:
      url: https://github.com/LucasXu0/unsplash_client.git
      ref: a8411fc

  # https://github.com/LucasXu0/flutter-permission-handler/commit/faef1c97970de29995642bfae61b884591798684
  # Prevent the location from being accessed continuously on Windows
  permission_handler:
    git:
      url: https://github.com/LucasXu0/flutter-permission-handler.git
      path: permission_handler
      ref: faef1c97970de29995642bfae61b884591798684
flutter:
  generate: true
  uses-material-design: true

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/google_fonts/Poppins/Poppins-ExtraLight.ttf
          weight: 100
        - asset: assets/google_fonts/Poppins/Poppins-Thin.ttf
          weight: 200
        - asset: assets/google_fonts/Poppins/Poppins-Light.ttf
          weight: 300
        - asset: assets/google_fonts/Poppins/Poppins-Regular.ttf
          weight: 400
        - asset: assets/google_fonts/Poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/google_fonts/Poppins/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/google_fonts/Poppins/Poppins-Bold.ttf
          weight: 700
        - asset: assets/google_fonts/Poppins/Poppins-Black.ttf
          weight: 800
        - asset: assets/google_fonts/Poppins/Poppins-ExtraBold.ttf
          weight: 900
    - family: RobotoMono
      fonts:
        - asset: assets/google_fonts/Roboto_Mono/RobotoMono-Regular.ttf
        - asset: assets/google_fonts/Roboto_Mono/RobotoMono-Italic.ttf
          style: italic
    # White-label font configuration will be added here
    # BEGIN: WHITE_LABEL_FONT
    # END: WHITE_LABEL_FONT

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/images/appearance/
    - assets/images/built_in_cover_images/
    - assets/flowy_icons/
    - assets/flowy_icons/16x/
    - assets/flowy_icons/20x/
    - assets/flowy_icons/24x/
    - assets/flowy_icons/32x/
    - assets/flowy_icons/40x/
    - assets/images/emoji/
    - assets/images/login/
    - assets/translations/
    - assets/icons/icons.json
    - assets/fonts/
    - assets/built_in_prompts.json

    # The following assets will be excluded in release.
    # BEGIN: EXCLUDE_IN_RELEASE
    - assets/test/workspaces/
    - assets/test/images/
    - assets/template/
    - assets/test/workspaces/markdowns/
    - assets/test/workspaces/database/
    # END: EXCLUDE_IN_RELEASE
